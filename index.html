<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>周宇轩 · 美团入职五周年 🎉</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');

    :root {
      --mt-yellow: #FFD100;
      --mt-orange: #FF6B00;
      --mt-dark: #1a1a2e;
      --mt-purple: #16213e;
      --gold: #f5c518;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans SC', 'PingFang SC', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      overflow-x: hidden;
      color: #fff;
    }

    /* ===== 彩带粒子 ===== */
    #confetti-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* ===== 主容器 ===== */
    .container {
      position: relative;
      z-index: 1;
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    /* ===== 顶部 Hero ===== */
    .hero {
      text-align: center;
      padding: 60px 0 40px;
    }

    .badge-5 {
      display: inline-block;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: conic-gradient(#FFD100, #FF6B00, #ff4e50, #f9d423, #FFD100);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      box-shadow: 0 0 60px rgba(255, 209, 0, 0.6);
      animation: spin-glow 4s linear infinite;
      position: relative;
    }

    .badge-5::before {
      content: '';
      position: absolute;
      inset: 6px;
      border-radius: 50%;
      background: #1a1040;
    }

    .badge-5 span {
      position: relative;
      z-index: 1;
      font-size: 64px;
      font-weight: 900;
      background: linear-gradient(135deg, #FFD100, #FF6B00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
    }

    @keyframes spin-glow {
      0%   { box-shadow: 0 0 40px rgba(255,209,0,0.5); }
      50%  { box-shadow: 0 0 80px rgba(255,107,0,0.8); }
      100% { box-shadow: 0 0 40px rgba(255,209,0,0.5); }
    }

    .hero-title {
      font-size: clamp(28px, 6vw, 52px);
      font-weight: 900;
      line-height: 1.2;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #FFD100 0%, #FF6B00 50%, #ff4e50 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: title-glow 2s ease-in-out infinite alternate;
    }

    @keyframes title-glow {
      from { filter: drop-shadow(0 0 8px rgba(255,209,0,0.4)); }
      to   { filter: drop-shadow(0 0 20px rgba(255,107,0,0.8)); }
    }

    .hero-sub {
      font-size: 18px;
      color: rgba(255,255,255,0.7);
      letter-spacing: 4px;
      margin-bottom: 8px;
    }

    .hero-date {
      font-size: 14px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 2px;
    }

    /* ===== 照片卡片 ===== */
    .photo-section {
      display: flex;
      justify-content: center;
      margin: 40px 0;
    }

    .photo-card {
      position: relative;
      width: 220px;
      height: 220px;
    }

    .photo-ring {
      position: absolute;
      inset: -12px;
      border-radius: 50%;
      background: conic-gradient(#FFD100, #FF6B00, #ff4e50, #a855f7, #3b82f6, #FFD100);
      animation: rotate 3s linear infinite;
    }

    @keyframes rotate {
      to { transform: rotate(360deg); }
    }

    .photo-ring::after {
      content: '';
      position: absolute;
      inset: 4px;
      border-radius: 50%;
      background: #1a1040;
    }

    .photo-card img {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #1a1040;
    }

    .photo-emoji {
      position: absolute;
      z-index: 2;
      font-size: 28px;
      animation: float 2s ease-in-out infinite alternate;
    }
    .photo-emoji:nth-child(3) { top: -10px; right: 10px; animation-delay: 0s; }
    .photo-emoji:nth-child(4) { bottom: 0px; left: -5px; animation-delay: 0.5s; }
    .photo-emoji:nth-child(5) { top: 50%; right: -20px; animation-delay: 1s; }

    @keyframes float {
      from { transform: translateY(0) rotate(-5deg); }
      to   { transform: translateY(-10px) rotate(5deg); }
    }

    /* ===== 里程碑时间轴 ===== */
    .timeline-section {
      margin: 50px 0;
    }

    .section-title {
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      color: var(--mt-yellow);
      letter-spacing: 3px;
      margin-bottom: 32px;
      position: relative;
    }

    .section-title::before,
    .section-title::after {
      content: '✦';
      margin: 0 12px;
      opacity: 0.6;
    }

    .timeline {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
    }

    .milestone {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,209,0,0.2);
      border-radius: 16px;
      padding: 20px 16px;
      text-align: center;
      transition: transform 0.3s, box-shadow 0.3s;
      cursor: default;
    }

    .milestone:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 40px rgba(255,209,0,0.2);
      border-color: rgba(255,209,0,0.5);
    }

    .milestone .icon { font-size: 32px; margin-bottom: 10px; }
    .milestone .year {
      font-size: 13px;
      color: var(--mt-yellow);
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .milestone .desc {
      font-size: 13px;
      color: rgba(255,255,255,0.7);
      line-height: 1.5;
    }

    /* ===== 数字统计 ===== */
    .stats-section {
      margin: 50px 0;
      background: rgba(255,209,0,0.05);
      border: 1px solid rgba(255,209,0,0.15);
      border-radius: 24px;
      padding: 36px 24px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 24px;
      text-align: center;
    }

    .stat-item .num {
      font-size: 42px;
      font-weight: 900;
      background: linear-gradient(135deg, #FFD100, #FF6B00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
    }

    .stat-item .unit {
      font-size: 16px;
      color: rgba(255,255,255,0.5);
      margin-top: 6px;
    }

    /* ===== 祝福墙 ===== */
    .blessing-section {
      margin: 50px 0;
    }

    .blessing-wall {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
      min-height: 80px;
    }

    .blessing-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 18px 16px;
      position: relative;
      overflow: hidden;
      animation: card-in 0.4s ease;
    }

    @keyframes card-in {
      from { opacity: 0; transform: scale(0.85) translateY(10px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .blessing-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--card-color, linear-gradient(90deg, #FFD100, #FF6B00));
    }

    .blessing-card .card-emoji { font-size: 22px; margin-bottom: 8px; }
    .blessing-card .card-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--mt-yellow);
      margin-bottom: 6px;
    }
    .blessing-card .card-text {
      font-size: 14px;
      color: rgba(255,255,255,0.8);
      line-height: 1.6;
    }
    .blessing-card .card-time {
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      margin-top: 10px;
    }

    .blessing-card .card-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .blessing-card:hover .card-actions {
      opacity: 1;
    }

    .card-btn {
      padding: 4px 12px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.6);
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }

    .card-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
    .card-btn.delete-btn:hover { background: rgba(255,80,80,0.3); border-color: rgba(255,80,80,0.5); color: #ff8080; }

    /* 编辑弹窗 */
    .edit-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .edit-modal-overlay.active { display: flex; }

    .edit-modal {
      background: #1e1b4b;
      border: 1px solid rgba(255,209,0,0.3);
      border-radius: 20px;
      padding: 28px 24px;
      width: 90%;
      max-width: 440px;
      animation: card-in 0.25s ease;
    }

    .edit-modal h3 {
      font-size: 16px;
      color: var(--mt-yellow);
      margin-bottom: 16px;
      letter-spacing: 2px;
    }

    .edit-modal input,
    .edit-modal textarea {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      width: 100%;
      margin-bottom: 10px;
      transition: border-color 0.2s;
    }

    .edit-modal input:focus,
    .edit-modal textarea:focus { border-color: var(--mt-yellow); }

    .edit-modal textarea { resize: vertical; min-height: 80px; }

    .edit-modal-row { display: flex; gap: 10px; }
    .edit-modal-row input:first-child { flex: 1; }
    .edit-modal-row input:last-child { width: 70px; flex: none; text-align: center; font-size: 18px; }

    .edit-modal-btns { display: flex; gap: 10px; margin-top: 4px; }
    .edit-modal-btns button {
      flex: 1;
      padding: 11px;
      border-radius: 10px;
      border: none;
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .edit-modal-btns button:hover { opacity: 0.85; }
    .btn-save { background: linear-gradient(135deg,#FFD100,#FF6B00); color: #1a1040; }
    .btn-cancel { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); }

    /* ===== 留言表单 ===== */
    .form-box {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,209,0,0.2);
      border-radius: 20px;
      padding: 28px 24px;
    }

    .form-row {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .form-box input,
    .form-box textarea {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }

    .form-box input:focus,
    .form-box textarea:focus {
      border-color: var(--mt-yellow);
    }

    .form-box input::placeholder,
    .form-box textarea::placeholder {
      color: rgba(255,255,255,0.3);
    }

    .form-box input.name-input { flex: 1; min-width: 140px; }
    .form-box input.emoji-input { width: 80px; flex: none; text-align: center; font-size: 20px; }

    .form-box textarea {
      resize: vertical;
      min-height: 90px;
      margin-bottom: 12px;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #FFD100, #FF6B00);
      color: #1a1040;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 2px;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(255,209,0,0.4);
    }

    .submit-btn:active { transform: translateY(0); }

    /* ===== 底部 ===== */
    .footer {
      text-align: center;
      padding: 40px 0 20px;
      color: rgba(255,255,255,0.3);
      font-size: 13px;
      letter-spacing: 2px;
    }

    .footer .meituan-logo {
      font-size: 28px;
      margin-bottom: 8px;
    }

    /* ===== 烟花按钮 ===== */
    .firework-btn {
      display: block;
      margin: 0 auto 40px;
      padding: 12px 32px;
      border: 2px solid var(--mt-yellow);
      border-radius: 50px;
      background: transparent;
      color: var(--mt-yellow);
      font-size: 15px;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 2px;
      transition: all 0.3s;
    }

    .firework-btn:hover {
      background: var(--mt-yellow);
      color: #1a1040;
      box-shadow: 0 0 30px rgba(255,209,0,0.5);
    }

    /* ===== 响应式 ===== */
    @media (max-width: 480px) {
      .hero-title { font-size: 32px; }
      .badge-5 { width: 110px; height: 110px; }
      .badge-5 span { font-size: 50px; }
    }
  </style>
</head>

  <!-- 数字统计 -->
  <section class="stats-section">
    <h2 class="section-title">这五年，你经历了</h2>
    <div class="stats-grid">
      <div class="stat-item">
        <div class="num" data-target="1826">0</div>
        <div class="unit">天的坚守</div>
      </div>
      <div class="stat-item">
        <div class="num" data-target="5">0</div>
        <div class="unit">次年终总结</div>
      </div>
      <div class="stat-item">
        <div class="num" data-target="∞" data-special="true">∞</div>
        <div class="unit">份成长与收获</div>
      </div>
    </div>
  </section>

  <!-- 祝福墙 -->
  <section class="blessing-section">
    <h2 class="section-title">祝福墙</h2>
    <div class="blessing-wall" id="blessing-wall">
      <!-- 预置祝福 -->
    </div>

    <div class="form-box">
      <div class="form-row">
        <input class="name-input" id="input-name" type="text" placeholder="你的名字" maxlength="20" />
        <input class="emoji-input" id="input-emoji" type="text" placeholder="🎁" maxlength="2" />
      </div>
      <textarea id="input-text" placeholder="写下你对宇轩的祝福吧～" maxlength="120"></textarea>
      <button class="submit-btn" onclick="submitBlessing()">🎉 送出祝福</button>
    </div>
  </section>

  <!-- 编辑弹窗 -->
  <div class="edit-modal-overlay" id="edit-modal">
    <div class="edit-modal">
      <h3>✏️ 编辑祝福</h3>
      <div class="edit-modal-row">
        <input id="edit-name" type="text" placeholder="你的名字" maxlength="20" />
        <input id="edit-emoji" type="text" placeholder="🎁" maxlength="2" style="text-align:center;font-size:18px;" />
      </div>
      <textarea id="edit-text" placeholder="祝福内容" maxlength="120"></textarea>
      <div class="edit-modal-btns">
        <button class="btn-save" onclick="saveEdit()">保存</button>
        <button class="btn-cancel" onclick="closeEdit()">取消</button>
      </div>
    </div>
  </div>

  <!-- 底部 -->
  <footer class="footer">
    <div class="meituan-logo">🐯</div>
    <p>美团 · 与你同行，感谢五年</p>
    <p style="margin-top:6px; font-size:11px;">Made with ❤️ for 周宇轩</p>
  </footer>

</div>

<script>
// ===== 彩带动画 =====
const canvas = document.getElementById('confetti-canvas');
const ctx = canvas.getContext('2d');
let W, H, particles = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const COLORS = ['#FFD100','#FF6B00','#ff4e50','#a855f7','#3b82f6','#10b981','#f472b6'];

function createParticle(x, y, burst) {
  const angle = Math.random() * Math.PI * 2;
  const speed = burst ? Math.random() * 14 + 4 : Math.random() * 2 + 1;
  return {
    x: x ?? Math.random() * W,
    y: y ?? -10,
    vx: burst ? Math.cos(angle) * speed : (Math.random() - 0.5) * 2,
    vy: burst ? Math.sin(angle) * speed - 6 : Math.random() * 3 + 1,
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
    size: Math.random() * (burst ? 12 : 8) + 4,
    rotation: Math.random() * 360,
    rotSpeed: (Math.random() - 0.5) * 10,
    shape: Math.random() > 0.4 ? 'rect' : 'circle',
    alpha: 1,
    gravity: burst ? 0.25 : 0.05,
    trail: burst && Math.random() > 0.6,
  };
}

function burst() {
  // 多点爆炸，持续释放
  const positions = [
    [W / 2, H / 3],
    [W * 0.25, H * 0.3],
    [W * 0.75, H * 0.3],
    [W * 0.15, H * 0.5],
    [W * 0.85, H * 0.5],
  ];
  let wave = 0;
  const maxWaves = 8;
  function fireWave() {
    if (wave >= maxWaves) return;
    const [cx, cy] = positions[wave % positions.length];
    for (let i = 0; i < 180; i++) particles.push(createParticle(cx + (Math.random()-0.5)*60, cy + (Math.random()-0.5)*40, true));
    wave++;
    setTimeout(fireWave, 350);
  }
  fireWave();
}

// 初始彩带
for (let i = 0; i < 60; i++) particles.push(createParticle());

function animate() {
  ctx.clearRect(0, 0, W, H);
  // 补充飘落彩带
  if (particles.filter(p => !p.burst).length < 60 && Math.random() < 0.3) {
    particles.push(createParticle());
  }

  particles = particles.filter(p => p.alpha > 0.01 && p.y < H + 20);

  particles.forEach(p => {
    p.x += p.vx;
    p.vy += p.gravity;
    p.y += p.vy;
    p.rotation += p.rotSpeed;
    if (p.y > H * 0.8) p.alpha -= 0.006;
    else if (p.alpha < 1 && p.burst) p.alpha -= 0.003;

    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rotation * Math.PI / 180);
    ctx.fillStyle = p.color;
    if (p.shape === 'rect') {
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
    } else {
      ctx.beginPath();
      ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  });

  requestAnimationFrame(animate);
}
animate();

// ===== 数字滚动 =====
function animateNumbers() {
  document.querySelectorAll('.num[data-target]').forEach(el => {
    if (el.dataset.special) return;
    const target = parseInt(el.dataset.target);
    let current = 0;
    const step = Math.ceil(target / 60);
    const timer = setInterval(() => {
      current = Math.min(current + step, target);
      el.textContent = current.toLocaleString();
      if (current >= target) clearInterval(timer);
    }, 30);
  });
}

const observer = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) { animateNumbers(); observer.disconnect(); } });
}, { threshold: 0.3 });
observer.observe(document.querySelector('.stats-section'));

// ===== 祝福墙 =====
const CARD_COLORS = [
  'linear-gradient(90deg,#FFD100,#FF6B00)',
  'linear-gradient(90deg,#a855f7,#3b82f6)',
  'linear-gradient(90deg,#10b981,#3b82f6)',
  'linear-gradient(90deg,#f472b6,#fb923c)',
  'linear-gradient(90deg,#34d399,#FFD100)',
];

// ===== 祝福墙数据 =====
const PRESET_KEY = 'blessings_zyx_v2';

// 仅一条示例预置数据（仅首次加载时写入）
function initPreset() {
  if (localStorage.getItem(PRESET_KEY + '_inited')) return;
  const preset = [{
    id: 'preset_1',
    name: '美团小伙伴',
    emoji: '🎊',
    text: '五年风雨同行，感谢你一直在！祝宇轩越来越棒，未来更精彩！',
    time: '2026-05-13 10:00',
    preset: true
  }];
  localStorage.setItem(PRESET_KEY, JSON.stringify(preset));
  localStorage.setItem(PRESET_KEY + '_inited', '1');
}

function getAll() {
  return JSON.parse(localStorage.getItem(PRESET_KEY) || '[]');
}

function saveAll(arr) {
  localStorage.setItem(PRESET_KEY, JSON.stringify(arr));
}

const wall = document.getElementById('blessing-wall');

function fmtTime() {
  const now = new Date();
  return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
}

function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderCard(b, colorIdx) {
  const card = document.createElement('div');
  card.className = 'blessing-card';
  card.dataset.id = b.id;
  card.style.setProperty('--card-color', CARD_COLORS[colorIdx % CARD_COLORS.length]);
  card.innerHTML = `
    <div class="card-emoji">${escapeHtml(b.emoji || '💛')}</div>
    <div class="card-name">${escapeHtml(b.name)}</div>
    <div class="card-text">${escapeHtml(b.text)}</div>
    <div class="card-time">${escapeHtml(b.time || '')}</div>
    <div class="card-actions">
      <button class="card-btn edit-btn" onclick="openEdit('${b.id}')">✏️ 编辑</button>
      <button class="card-btn delete-btn" onclick="deleteCard('${b.id}')">🗑 删除</button>
    </div>
  `;
  return card;
}

function loadBlessings() {
  const all = getAll();
  wall.innerHTML = '';
  if (all.length === 0) {
    wall.innerHTML = '<p style="color:rgba(255,255,255,0.3);font-size:14px;text-align:center;padding:20px 0;">还没有祝福，快来第一个留言吧 💛</p>';
    return;
  }
  all.forEach((b, i) => wall.appendChild(renderCard(b, i)));
}

function submitBlessing() {
  const name = document.getElementById('input-name').value.trim();
  const emoji = document.getElementById('input-emoji').value.trim();
  const text = document.getElementById('input-text').value.trim();

  if (!name) { alert('请填写你的名字 😊'); return; }
  if (!text) { alert('请写下你的祝福 💛'); return; }

  const all = getAll();
  const newBlessing = {
    id: 'b_' + Date.now(),
    name,
    emoji: emoji || '💛',
    text,
    time: fmtTime()
  };
  all.push(newBlessing);
  saveAll(all);

  document.getElementById('input-name').value = '';
  document.getElementById('input-emoji').value = '';
  document.getElementById('input-text').value = '';

  loadBlessings();
  burst();
  wall.lastElementChild?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function deleteCard(id) {
  if (!confirm('确定删除这条祝福吗？')) return;
  const all = getAll().filter(b => b.id !== id);
  saveAll(all);
  loadBlessings();
}

// ===== 编辑弹窗 =====
let editingId = null;

function openEdit(id) {
  const all = getAll();
  const b = all.find(x => x.id === id);
  if (!b) return;
  editingId = id;
  document.getElementById('edit-name').value = b.name;
  document.getElementById('edit-emoji').value = b.emoji || '';
  document.getElementById('edit-text').value = b.text;
  document.getElementById('edit-modal').classList.add('active');
}

function closeEdit() {
  editingId = null;
  document.getElementById('edit-modal').classList.remove('active');
}

function saveEdit() {
  const name = document.getElementById('edit-name').value.trim();
  const emoji = document.getElementById('edit-emoji').value.trim();
  const text = document.getElementById('edit-text').value.trim();
  if (!name) { alert('请填写名字 😊'); return; }
  if (!text) { alert('请填写祝福内容 💛'); return; }

  const all = getAll();
  const idx = all.findIndex(x => x.id === editingId);
  if (idx !== -1) {
    all[idx] = { ...all[idx], name, emoji: emoji || '💛', text };
    saveAll(all);
  }
  closeEdit();
  loadBlessings();
}

// 点击遮罩关闭
document.getElementById('edit-modal').addEventListener('click', function(e) {
  if (e.target === this) closeEdit();
});

initPreset();
loadBlessings();

// 页面加载时来一波烟花
setTimeout(burst, 600);
setTimeout(burst, 3200);
</script>
</body>
</html>
